name: Kotlin Multiplatform CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Shared Tests (JVM & Android)
        run: ./gradlew :shared:jvmTest :shared:testAndroidHostTest

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'

      - name: Build Android App (AAB)
        run: ./gradlew :androidApp:bundleDebug

      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle
          path: androidApp/build/outputs/bundle/debug/*.aab

      - name: Build Desktop App (Linux)
        run: ./gradlew :desktopApp:assemble

      - name: Upload Desktop .deb (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-deb
          path: desktopApp/build/compose/binaries/main/deb/*.deb

